<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProManage - Dashboard Profesor</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-body: #f3f4f6;
            --bg-sidebar: #1e293b;
            --bg-card: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        .header {
            height: 64px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            z-index: 10;
        }

        .header__logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .header__logo-icon {
            width: 24px;
            height: 24px;
            background-color: var(--primary);
            border-radius: 4px;
        }

        .header__profile {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .profile__name {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .profile__avatar {
            width: 36px;
            height: 36px;
            background-color: #dbeafe;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }

        /* --- Layout --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 0.5rem;
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #f1f5f9;
        }

        .nav-link.active {
            background-color: var(--primary);
            color: white;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- Content --- */
        .content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .content__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: white;
            border-color: var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: #f9fafb;
            border-color: #d1d5db;
        }

        /* --- Course List --- */
        .course-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .course-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .course__image {
            width: 140px;
            height: 80px;
            background-color: #e2e8f0;
            border-radius: 0.5rem;
            object-fit: cover;
            flex-shrink: 0;
        }

        .course__info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .course__title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .course__meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .meta-icon {
            width: 16px;
            height: 16px;
        }

        .course__placeholders {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .placeholder-item {
            width: 24px;
            height: 6px;
            background-color: #cbd5e1;
            border-radius: 3px;
        }

        .course__actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <a href="#" class="header__logo">
            <div class="header__logo-icon"></div>
            Promanage
        </a>
        <div class="header__profile">
            <span class="profile__name">Prof. Juan Pérez</span>
            <div class="profile__avatar">JP</div>
        </div>
    </header>

    <!-- Layout -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav>
                <a href="#" class="nav-link active">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    Mis Cursos
                </a>
                <a href="#" class="nav-link">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Entregas
                </a>
                <a href="#" class="nav-link">
                    <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Mi Perfil
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <div class="content__header">
                <h1 class="page-title">Mis Cursos</h1>
                <button class="btn btn-primary">
                    <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Crear Curso
                </button>
            </div>

            <div class="course-list">
                <!-- Course 1 -->
                <article class="course-card">
                    <img src="https://via.placeholder.com/140x80/3b82f6/ffffff?text=DW" alt="Curso" class="course__image">
                    <div class="course__info">
                        <h2 class="course__title">Desarrollo Web Full Stack</h2>
                        <div class="course__meta">
                            <svg class="meta-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            <span>36 estudiantes</span>
                        </div>
                        <div class="course__placeholders">
                            <div class="placeholder-item" style="width: 20px;"></div>
                            <div class="placeholder-item" style="width: 20px;"></div>
                            <div class="placeholder-item" style="width: 20px;"></div>
                        </div>
                    </div>
                    <div class="course__actions">
                        <button class="btn btn-secondary">Ver Entregas</button>
                        <button class="btn btn-primary">Abrir Curso</button>
                    </div>
                </article>

                <!-- Course 2 -->
                <article class="course-card">
                    <img src="https://via.placeholder.com/140x80/10b981/ffffff?text=BD" alt="Curso" class="course__image">
                    <div class="course__info">
                        <h2 class="course__title">Bases de Datos Avanzadas</h2>
                        <div class="course__meta">
                            <svg class="meta-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            <span>24 estudiantes</span>
                        </div>
                        <div class="course__placeholders">
                            <div class="placeholder-item" style="width: 20px;"></div>
                            <div class="placeholder-item" style="width: 20px;"></div>
                        </div>
                    </div>
                    <div class="course__actions">
                        <button class="btn btn-secondary">Ver Entregas</button>
                        <button class="btn btn-primary">Abrir Curso</button>
                    </div>
                </article>

                <!-- Course 3 -->
                <article class="course-card">
                    <img src="https://via.placeholder.com/140x80/8b5cf6/ffffff?text=UI" alt="Curso" class="course__image">
                    <div class="course__info">
                        <h2 class="course__title">Diseño de Interfaces UI/UX</h2>
                        <div class="course__meta">
                            <svg class="meta-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                            <span>42 estudiantes</span>
                        </div>
                        <div class="course__placeholders">
                            <div class="placeholder-item" style="width: 20px;"></div>
                            <div class="placeholder-item" style="width: 20px;"></div>
                            <div class="placeholder-item" style="width: 20px;"></div>
                            <div class="placeholder-item" style="width: 20px;"></div>
                        </div>
                    </div>
                    <div class="course__actions">
                        <button class="btn btn-secondary">Ver Entregas</button>
                        <button class="btn btn-primary">Abrir Curso</button>
                    </div>
                </article>
            </div>
        </main>
    </div>
</body>
</html>
