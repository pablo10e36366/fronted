<div class="container">
  <h2>Proyectos</h2>

  <!-- ✅ Subir -->
  <div class="card form">
    <h3>Subir proyecto</h3>

    <input [(ngModel)]="title" placeholder="Título" />
    <textarea [(ngModel)]="description" placeholder="Descripción"></textarea>

    <input type="file" (change)="onFileChange($event)" />

    <button (click)="upload()">Subir</button>
  </div>

  <!-- ✅ Buscar -->
  <div class="search-bar">
    <input [(ngModel)]="search" placeholder="Buscar por título, descripción o usuario..." />
    <button (click)="onSearch()">Buscar</button>
    <button (click)="search=''; onSearch()">Limpiar</button>
  </div>

  <p *ngIf="loading">Cargando...</p>

  <!-- ✅ Lista -->
  <div *ngFor="let p of projects; trackBy: trackById" class="card">
    <div class="row">
      <div class="info">
        <h3>{{ p.title }}</h3>
        <p class="meta">Subido por: <b>{{ uploaderName(p) }}</b></p>
        <p class="meta">Estado: <b>{{ p.status }}</b></p>
        <p class="desc">{{ p.description }}</p>
      </div>

      <div class="actions">
        <button (click)="download(p.id)">Descargar</button>
        <button (click)="startEdit(p)">Editar</button>
        <button class="danger" (click)="remove(p.id)">Eliminar</button>
      </div>
    </div>

    <!-- ✅ Editar inline -->
    <div *ngIf="editingId === p.id" class="edit-box">
      <label>Título</label>
      <input [(ngModel)]="editTitle" />

      <label>Descripción</label>
      <textarea [(ngModel)]="editDescription"></textarea>

      <label>Estado</label>
      <select [(ngModel)]="editStatus">
        <option value="PENDIENTE">PENDIENTE</option>
        <option value="EN_PROCESO">EN PROCESO</option>
        <option value="FINALIZADO">FINALIZADO</option>
      </select>

      <div class="edit-actions">
        <button (click)="saveEdit(p.id)">Guardar</button>
        <button (click)="cancelEdit()">Cancelar</button>
      </div>
    </div>
  </div>
</div>
