<section class="content">
  <ng-container [ngSwitch]="role">
    <ng-container *ngSwitchCase="'admin'">
      <app-projects-admin></app-projects-admin>
    </ng-container>
    <ng-container *ngSwitchCase="'docente'">
      <div class="card">
        <h3>Acceso no disponible</h3>
        <p>Tu interfaz principal ahora es el Panel Docente.</p>
      </div>
    </ng-container>
    <ng-container *ngSwitchCase="'estudiante'">
      <app-projects-student></app-projects-student>
    </ng-container>
    <ng-container *ngSwitchDefault>
      <div class="card">
        <h3>Acceso no autorizado</h3>
        <p>No tienes los permisos necesarios para ver esta sección.</p>
      </div>
    </ng-container>
  </ng-container>
</section>
