<div class="login-page">
  <div class="login-card">
    <h1 class="title">Iniciar sesión</h1>
    <p class="subtitle">Ingresa con tu cuenta para continuar</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" name="email" [(ngModel)]="email" required placeholder="ejemplo@correo.com" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="password-field">
          <input
            class="password-input"
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="********"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
            [title]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
          >
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path
                d="M12 5C6.5 5 2.1 8.4 1 12c1.1 3.6 5.5 7 11 7s9.9-3.4 11-7c-1.1-3.6-5.5-7-11-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"
                fill="currentColor"
              />
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <path
                d="M2.3 1 1 2.3l3.2 3.2C2.8 6.6 1.8 8.2 1 10c1.1 3.6 5.5 7 11 7 2.2 0 4.2-.5 5.9-1.4L21.7 19 23 17.7 2.3 1ZM12 15a4 4 0 0 1-4-4c0-.7.2-1.4.5-2l5.5 5.5c-.6.3-1.3.5-2 .5Zm0-10c5.5 0 9.9 3.4 11 7-.4 1.4-1.3 2.8-2.5 4L18.9 14a7 7 0 0 0 1.8-2c-1.1-2.8-4.5-5-8.7-5-1.2 0-2.4.2-3.5.6L6.9 6c1.5-.6 3.2-1 5.1-1Z"
                fill="currentColor"
              />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading">Verificando...</span>
      </button>
    </form>

    <p class="hint">¿No tienes cuenta? <a routerLink="/register" class="hint-strong">Regístrate aquí</a></p>
  </div>
</div>
